# ByteTrack tuned for this crowded, same-uniform entrance scene.
# Goal: reduce ID churn / fragmentation that inflates unique-ID counting.
tracker_type: bytetrack
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.45   # higher: don't spawn a new ID from flickering low-conf boxes
track_buffer: 90         # keep lost tracks alive ~3s so re-appearing people keep their ID
match_thresh: 0.8
fuse_score: True
